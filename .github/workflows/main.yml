name: Angular CI/CD to EC2

on:
  push:
    branches:
      - main  # change to your main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'  # match your Angular CLI Node version

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Build Angular app
      - name: Build Angular
        run: npm run build -- --prod

      # 5️⃣ Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: 22
          script: |
            # Create app dir if not exists
            mkdir -p ${{ secrets.EC2_APP_DIR }}

            # Remove old files
            rm -rf ${{ secrets.EC2_APP_DIR }}/*

            # Copy new build files
            cp -r ./dist/* ${{ secrets.EC2_APP_DIR }}/

            # Reload Nginx (if used)
            sudo systemctl restart nginx

            echo "Angular app deployed successfully!"
